name: Generate Contribution Snake

# Run automatically every 12 hours and allow manual trigger
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - uses: actions/checkout@v3

      # Generate the snake SVG
      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: gideon254-ux
          outputs: dist/github-contribution-grid-snake.svg

      # Commit and push the SVG to 'output' branch
      - name: Push Snake to Output Branch
        uses: actions-gh-pages@v4
        with:
          branch: output
          folder: dist
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
